<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>銀河創業大冒險 — 台灣公司行號設立流程</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Orbitron:wght@700;900&family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #04070F;
  --bg2: #070D1A;
  --card: rgba(8,18,40,0.92);
  --card-border: rgba(64,180,255,0.18);
  --primary: #40B4FF;
  --primary-glow: rgba(64,180,255,0.35);
  --accent: #C8A8FF;
  --accent2: #7FFFDF;
  --gold: #FFD166;
  --company-color: #A78BFA;
  --hao-color: #34D399;
  --dark: #E8F4FF;
  --mid: #7CA8CC;
  --light: rgba(64,140,200,0.2);
  --success: #34D399;
  --error: #F87171;
  --shadow: 0 4px 32px rgba(0,80,200,0.25);
  --shadow-lg: 0 8px 60px rgba(0,80,200,0.4);
  --radius: 20px; --radius-sm: 12px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  font-family:'Exo 2',sans-serif;
  background:var(--bg);
  color:var(--dark);
  min-height:100vh;
  overflow-x:hidden;
}

/* ── GALAXY BACKGROUND ── */
.galaxy-bg{
  position:fixed;inset:0;z-index:0;overflow:hidden;
  background: radial-gradient(ellipse at 20% 50%, rgba(10,30,80,0.8) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 20%, rgba(60,0,120,0.5) 0%, transparent 50%),
              radial-gradient(ellipse at 60% 80%, rgba(0,50,100,0.6) 0%, transparent 50%),
              linear-gradient(135deg, #020510 0%, #040C20 50%, #030810 100%);
}
.stars{position:absolute;inset:0;}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--dur,3s) ease-in-out infinite var(--del,0s);}
@keyframes twinkle{0%,100%{opacity:var(--op,0.6);transform:scale(1);}50%{opacity:1;transform:scale(1.4);}}
.nebula{
  position:absolute;border-radius:50%;filter:blur(80px);opacity:0.12;
  animation:nebula-drift 20s ease-in-out infinite;
}
@keyframes nebula-drift{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(20px,-15px) scale(1.05);}}

/* ── WRAPPER ── */
.wrapper{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:20px 16px 80px;}

/* ── HEADER ── */
.game-header{text-align:center;padding:28px 0 20px;position:relative;}
.header-glow{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:300px;height:100px;background:var(--primary);
  border-radius:50%;filter:blur(60px);opacity:0.08;pointer-events:none;
}
.mascot{font-size:60px;display:flex;align-items:center;justify-content:center;min-height:68px;margin-bottom:6px;animation:float-mascot 3s ease-in-out infinite;}
.mascot svg{width:60px;height:60px;}
@keyframes float-mascot{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.game-title{
  font-family:'Orbitron',monospace;
  font-size:clamp(20px,5vw,34px);
  font-weight:900;
  background:linear-gradient(135deg,#40B4FF,#C8A8FF,#7FFFDF);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:2px;line-height:1.2;
  text-shadow:none;
}
.game-subtitle{font-size:13px;color:var(--mid);margin-top:6px;letter-spacing:1px;}

/* ── PROGRESS ── */
.progress-wrap{
  background:var(--card);
  border:1px solid var(--card-border);
  border-radius:var(--radius);
  padding:16px 20px;margin-bottom:20px;
  box-shadow:var(--shadow);
  backdrop-filter:blur(12px);
}
.progress-labels{display:flex;justify-content:space-between;font-size:13px;color:var(--mid);margin-bottom:8px;font-weight:600;letter-spacing:0.5px;}
.progress-bar-outer{background:rgba(64,140,200,0.12);border-radius:99px;height:10px;overflow:hidden;border:1px solid rgba(64,180,255,0.15);}
.progress-bar-inner{
  height:100%;border-radius:99px;
  background:linear-gradient(90deg,#40B4FF,#C8A8FF);
  transition:width 0.7s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 0 12px rgba(64,180,255,0.6);
}
.progress-steps{display:flex;gap:4px;margin-top:10px;flex-wrap:wrap;}
.step-dot{
  flex:1;min-width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;
  background:rgba(64,140,200,0.1);color:var(--mid);
  border:1px solid rgba(64,140,200,0.2);
  transition:all 0.3s;
}
.step-dot.active{
  background:linear-gradient(135deg,#40B4FF,#7B61FF);color:#fff;
  transform:scale(1.2);
  box-shadow:0 0 16px rgba(64,180,255,0.5);
  border-color:transparent;
}
.step-dot.done{background:var(--success);color:#fff;border-color:transparent;}

/* ── CARD ── */
.card{
  background:var(--card);
  border:1px solid var(--card-border);
  border-radius:var(--radius);
  padding:28px 24px;margin-bottom:16px;
  box-shadow:var(--shadow);
  backdrop-filter:blur(16px);
  animation:slideUp 0.4s ease;
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(64,180,255,0.4),rgba(200,168,255,0.4),transparent);
}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.card-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:linear-gradient(135deg,rgba(64,180,255,0.2),rgba(123,97,255,0.2));
  color:var(--primary);
  border:1px solid rgba(64,180,255,0.3);
  font-size:11px;font-weight:700;padding:4px 12px;
  border-radius:99px;margin-bottom:12px;
  letter-spacing:1px;text-transform:uppercase;
}
.card-title{font-family:'Orbitron',monospace;font-size:clamp(17px,3.5vw,23px);font-weight:700;line-height:1.3;margin-bottom:8px;color:#E8F4FF;letter-spacing:0.5px;}
.card-desc{font-size:15px;color:var(--mid);line-height:1.8;}

/* ── INFO BOX ── */
.info-box{
  background:rgba(64,140,200,0.08);
  border-left:3px solid var(--primary);
  border-radius:var(--radius-sm);
  padding:14px 16px;margin:14px 0;font-size:14px;line-height:1.8;
  border:1px solid rgba(64,180,255,0.12);
  border-left-width:3px;border-left-color:var(--primary);
}
.info-box.tip{border-left-color:var(--accent2);background:rgba(127,255,223,0.05);}
.info-box.warn{border-left-color:var(--gold);background:rgba(255,209,102,0.06);}
.info-box.company{border-left-color:var(--company-color);background:rgba(167,139,250,0.07);}
.info-box.hao{border-left-color:var(--hao-color);background:rgba(52,211,153,0.07);}
.info-box strong{color:var(--dark);}
.info-box-title{font-weight:700;font-size:14px;margin-bottom:6px;display:flex;align-items:center;gap:6px;letter-spacing:0.3px;}
.hl{color:var(--primary);font-weight:700;border-bottom:1px solid var(--primary);}
.hl-blue{color:var(--company-color);font-weight:700;border-bottom:1px solid var(--company-color);}
.hl-green{color:var(--hao-color);font-weight:700;border-bottom:1px solid var(--hao-color);}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:13px 26px;border-radius:var(--radius-sm);
  font-size:15px;font-weight:700;cursor:pointer;border:none;
  transition:all 0.2s;font-family:'Exo 2',sans-serif;
  letter-spacing:0.5px;
}
.btn-primary{
  background:linear-gradient(135deg,#1E6FD4,#7B61FF);
  color:#fff;
  box-shadow:0 0 20px rgba(64,180,255,0.35),inset 0 1px 0 rgba(255,255,255,0.1);
  border:1px solid rgba(64,180,255,0.3);
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 0 30px rgba(64,180,255,0.55),inset 0 1px 0 rgba(255,255,255,0.15);}
.btn-secondary{
  background:rgba(64,140,200,0.12);color:var(--primary);
  border:1px solid rgba(64,180,255,0.25);
}
.btn-secondary:hover{background:rgba(64,140,200,0.22);border-color:rgba(64,180,255,0.4);}
.btn-skip{
  background:transparent;color:var(--mid);
  border:1px dashed rgba(100,150,200,0.3);
  font-size:13px;padding:10px 16px;
}
.btn-skip:hover{border-color:var(--mid);color:var(--dark);}
.btn-line{
  background:linear-gradient(135deg,#06C755,#00A344);
  color:#fff;font-size:15px;padding:13px 26px;
  box-shadow:0 0 20px rgba(6,199,85,0.35);
  border:1px solid rgba(6,199,85,0.4);
}
.btn-line:hover{transform:translateY(-2px);box-shadow:0 0 30px rgba(6,199,85,0.55);}
.btn:disabled{opacity:0.35;cursor:not-allowed;transform:none!important;}
/* SKIP LEFT, NEXT RIGHT */
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px;align-items:center;}
.btn-row .btn-skip{margin-right:auto;order:-1;}

/* ── INTRO / CHARACTER ── */
.char-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:14px 0;}
@media(max-width:480px){.char-grid{grid-template-columns:repeat(2,1fr);gap:8px;}}
.char-card{
  border:1px solid rgba(64,180,255,0.18);
  border-radius:16px;padding:8px 4px 10px;
  text-align:center;cursor:pointer;transition:all 0.25s;
  background:rgba(5,15,40,0.7);
  position:relative;overflow:hidden;
}
.char-card::before{content:'';position:absolute;inset:0;border-radius:16px;background:linear-gradient(180deg,rgba(64,180,255,0.04) 0%,transparent 100%);pointer-events:none;}
.char-card:hover{transform:translateY(-4px);box-shadow:0 0 24px rgba(64,180,255,0.25);border-color:rgba(64,180,255,0.5);}
.char-card.selected{
  border-color:var(--primary);
  background:rgba(64,180,255,0.1);
  box-shadow:0 0 28px rgba(64,180,255,0.3),inset 0 0 20px rgba(64,180,255,0.05);
}
.char-avatar{width:100px;height:100px;margin:0 auto 4px;display:block;}
.char-avatar img{width:100%;height:100%;object-fit:contain;}
.char-name{font-size:11px;font-weight:700;color:var(--primary);letter-spacing:0.3px;margin-top:5px;text-shadow:0 0 8px rgba(64,180,255,0.5);}
.char-card.selected .char-name{color:var(--primary);}
.char-card.selected .char-avatar rect.base-glow{opacity:1!important;}
.nickname-input{
  width:100%;padding:14px 18px;
  border-radius:var(--radius-sm);
  border:1px solid rgba(64,180,255,0.2);
  font-size:17px;font-family:'Exo 2',sans-serif;
  outline:none;transition:all 0.2s;
  background:rgba(64,140,200,0.08);
  color:#E8F4FF;text-align:center;font-weight:700;
  letter-spacing:1px;
}
.nickname-input:focus{border-color:var(--primary);box-shadow:0 0 16px rgba(64,180,255,0.2);}
.nickname-input::placeholder{font-weight:400;color:rgba(124,168,204,0.5);letter-spacing:0;}

/* ── SITUATION Q ── */
.situation-q{
  background:rgba(64,140,200,0.06);
  border-radius:var(--radius-sm);padding:16px 18px;margin:10px 0;
  border:1px solid rgba(64,180,255,0.1);
}
.situation-q-text{font-weight:700;font-size:15px;margin-bottom:10px;color:#C8E8FF;}
.q-num{
  background:linear-gradient(135deg,#40B4FF,#7B61FF);color:#fff;
  width:26px;height:26px;border-radius:50%;
  display:inline-flex;align-items:center;justify-content:center;
  font-size:12px;margin-right:8px;box-shadow:0 0 10px rgba(64,180,255,0.4);
}
.radio-group{display:flex;gap:8px;flex-wrap:wrap;}
.radio-btn{
  padding:9px 18px;border-radius:var(--radius-sm);
  border:1px solid rgba(64,180,255,0.2);
  background:rgba(64,140,200,0.06);
  cursor:pointer;font-size:14px;font-weight:600;
  transition:all 0.2s;font-family:'Exo 2',sans-serif;color:var(--mid);
}
.radio-btn:hover{border-color:var(--primary);color:var(--primary);}
.radio-btn.selected{border-color:var(--primary);background:rgba(64,180,255,0.18);color:var(--primary);}

/* ── RESULT CARD ── */
.result-card{border-radius:var(--radius);padding:24px;text-align:center;margin-top:18px;animation:popIn 0.5s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{opacity:0;transform:scale(0.85)}to{opacity:1;transform:scale(1)}}
.result-card.company-result{background:rgba(167,139,250,0.1);border:1px solid rgba(167,139,250,0.3);}
.result-card.hao-result{background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,0.3);}
.result-card-icon{font-size:52px;margin-bottom:10px;display:block;}
.result-card-title{font-family:'Orbitron',monospace;font-size:20px;font-weight:700;margin-bottom:8px;}
.result-card-desc{font-size:14px;color:var(--mid);line-height:1.8;}
.price-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 18px;border-radius:99px;font-size:16px;font-weight:900;margin:10px 4px;
}
.price-badge.company{background:linear-gradient(135deg,rgba(167,139,250,0.3),rgba(123,97,255,0.2));color:var(--company-color);border:1px solid rgba(167,139,250,0.4);}
.price-badge.hao{background:linear-gradient(135deg,rgba(52,211,153,0.2),rgba(0,200,150,0.15));color:var(--hao-color);border:1px solid rgba(52,211,153,0.4);}

/* ── CHECKBOX ── */
.checkbox-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:9px;margin:14px 0;}
.checkbox-item{
  display:flex;align-items:center;gap:10px;
  background:rgba(64,140,200,0.06);
  border-radius:var(--radius-sm);padding:11px 13px;
  cursor:pointer;border:1px solid rgba(64,180,255,0.1);
  transition:all 0.2s;font-size:14px;font-weight:500;color:var(--mid);
}
.checkbox-item:hover{border-color:rgba(127,255,223,0.3);}
.checkbox-item.checked{border-color:var(--accent2);background:rgba(127,255,223,0.07);color:var(--dark);}
.cb-box{
  width:20px;height:20px;border-radius:5px;
  border:1px solid rgba(64,180,255,0.25);
  background:rgba(64,140,200,0.08);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all 0.2s;font-size:13px;
}
.checkbox-item.checked .cb-box{background:var(--accent2);border-color:var(--accent2);color:#000;}
.item-icon{font-size:19px;}
.custom-input-row{display:flex;gap:8px;margin-top:8px;}
.custom-input-row input{
  flex:1;padding:10px 14px;border-radius:var(--radius-sm);
  border:1px solid rgba(64,180,255,0.2);font-size:14px;
  font-family:'Exo 2',sans-serif;outline:none;transition:all 0.2s;
  background:rgba(64,140,200,0.08);color:var(--dark);
}
.custom-input-row input:focus{border-color:var(--accent2);}
.custom-input-row input::placeholder{color:rgba(124,168,204,0.5);}
.custom-input-row button{
  padding:10px 16px;border-radius:var(--radius-sm);
  background:rgba(127,255,223,0.15);color:var(--accent2);
  border:1px solid rgba(127,255,223,0.3);cursor:pointer;
  font-weight:700;font-family:'Exo 2',sans-serif;white-space:nowrap;
}
.custom-tag{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 12px;border-radius:99px;
  background:rgba(127,255,223,0.1);
  border:1px solid rgba(127,255,223,0.25);
  font-size:13px;font-weight:600;margin:4px;color:var(--accent2);
}
.custom-tag .del-btn{cursor:pointer;color:var(--mid);font-size:15px;line-height:1;}

/* ── QUIZ ── */
.quiz-options{display:flex;flex-direction:column;gap:9px;margin:14px 0;}
.quiz-option{
  padding:13px 16px;border-radius:var(--radius-sm);
  border:1px solid rgba(64,180,255,0.15);
  background:rgba(64,140,200,0.06);
  cursor:pointer;font-size:14px;font-weight:600;
  transition:all 0.2s;text-align:left;
  font-family:'Exo 2',sans-serif;color:var(--mid);
  display:flex;align-items:center;gap:10px;
}
.quiz-option:hover:not(:disabled){border-color:var(--primary);background:rgba(64,180,255,0.1);color:var(--dark);}
.quiz-option.correct{border-color:var(--success);background:rgba(52,211,153,0.1);color:var(--dark);}
.quiz-option.wrong{border-color:var(--error);background:rgba(248,113,113,0.08);}
.quiz-option .opt-label{
  width:26px;height:26px;border-radius:50%;
  background:rgba(64,140,200,0.15);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;flex-shrink:0;
}
.quiz-option.correct .opt-label{background:var(--success);color:#fff;}
.quiz-option.wrong .opt-label{background:var(--error);color:#fff;}
.quiz-feedback{padding:13px 16px;border-radius:var(--radius-sm);font-size:14px;line-height:1.8;margin-top:8px;animation:slideUp 0.3s ease;}
.quiz-feedback.correct{background:rgba(52,211,153,0.1);border-left:3px solid var(--success);}
.quiz-feedback.wrong{background:rgba(248,113,113,0.08);border-left:3px solid var(--error);}

/* ── MATCH ── */
.match-item{
  padding:11px 13px;border-radius:var(--radius-sm);
  border:1px solid rgba(64,180,255,0.15);
  background:rgba(64,140,200,0.06);
  cursor:pointer;font-size:13px;font-weight:600;
  transition:all 0.2s;text-align:center;margin-bottom:8px;color:var(--mid);
}
.match-item:hover{border-color:var(--primary);}
.match-item.selected-left{border-color:var(--primary);background:rgba(64,180,255,0.1);color:var(--primary);}
.match-item.matched-company{border-color:var(--company-color);background:rgba(167,139,250,0.1);cursor:default;color:var(--company-color);}
.match-item.matched-hao{border-color:var(--hao-color);background:rgba(52,211,153,0.08);cursor:default;color:var(--hao-color);}
.match-item.matched-both{border-color:var(--accent2);background:rgba(127,255,223,0.07);cursor:default;color:var(--accent2);}
.match-item.wrong-flash{animation:wrongFlash 0.5s ease;}
@keyframes wrongFlash{0%,100%{background:rgba(64,140,200,0.06)}50%{background:rgba(248,113,113,0.15);border-color:var(--error)}}

/* ── DOC LIST ── */
.doc-list{list-style:none;margin:10px 0;}
.doc-list li{
  display:flex;align-items:flex-start;gap:12px;
  padding:12px 14px;border-radius:var(--radius-sm);
  background:rgba(64,140,200,0.06);margin-bottom:8px;
  font-size:14px;line-height:1.7;
  border:1px solid rgba(64,180,255,0.08);
}
.doc-num{
  min-width:26px;height:26px;border-radius:50%;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;flex-shrink:0;margin-top:1px;
}
.doc-list.company .doc-num{background:linear-gradient(135deg,var(--company-color),#6D4AFF);}
.doc-list.hao .doc-num{background:linear-gradient(135deg,var(--hao-color),#00A878);}

/* ── CHECKLIST ── */
.checklist{list-style:none;margin:10px 0;}
.checklist-item{
  display:flex;align-items:center;gap:12px;
  padding:13px 15px;border-radius:var(--radius-sm);
  background:rgba(64,140,200,0.06);margin-bottom:8px;
  cursor:pointer;border:1px solid rgba(64,180,255,0.1);
  transition:all 0.2s;font-size:14px;font-weight:600;color:var(--mid);
}
.checklist-item:hover{border-color:rgba(127,255,223,0.3);}
.checklist-item.done{background:rgba(52,211,153,0.08);border-color:rgba(52,211,153,0.3);color:var(--success);}
.check-circle{
  width:26px;height:26px;border-radius:50%;
  border:1px solid rgba(64,180,255,0.2);
  background:rgba(64,140,200,0.08);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all 0.2s;font-size:15px;
}
.checklist-item.done .check-circle{background:var(--success);border-color:var(--success);color:#fff;}

/* ── PATH SELECTOR ── */
.path-selector{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:14px 0;}
@media(max-width:480px){.path-selector{grid-template-columns:1fr;}}
.path-card{
  padding:18px 14px;border-radius:var(--radius);
  border:1px solid rgba(64,180,255,0.15);
  text-align:center;cursor:pointer;transition:all 0.3s;
  background:rgba(64,140,200,0.06);
}
.path-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);}
.path-card.company-path:hover,.path-card.company-path.active{border-color:var(--company-color);background:rgba(167,139,250,0.1);box-shadow:0 0 30px rgba(167,139,250,0.2);}
.path-card.hao-path:hover,.path-card.hao-path.active{border-color:var(--hao-color);background:rgba(52,211,153,0.08);box-shadow:0 0 30px rgba(52,211,153,0.15);}
.path-card .path-icon{font-size:44px;display:block;margin-bottom:8px;}
.path-card .path-name{font-family:'Orbitron',monospace;font-size:15px;font-weight:700;}
.path-card .path-hint{font-size:12px;color:var(--mid);margin-top:4px;}

/* ── AWARD ── */
.award-screen{
  text-align:center;padding:28px 18px;
  background:rgba(4,15,40,0.95);
  border-radius:var(--radius);
  border:1px solid rgba(64,180,255,0.25);
  box-shadow:0 0 60px rgba(64,180,255,0.15),0 0 120px rgba(200,168,255,0.1);
  animation:popIn 0.6s cubic-bezier(.34,1.56,.64,1);
  position:relative;overflow:hidden;
}
.award-screen::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,#40B4FF,#C8A8FF,#7FFFDF,transparent);
}
.award-trophy{font-size:72px;display:block;margin-bottom:10px;animation:spinIn 1s ease;}
@keyframes spinIn{0%{transform:rotate(-10deg) scale(0.5)}100%{transform:rotate(0) scale(1)}}
.award-title{
  font-family:'Orbitron',monospace;font-size:32px;font-weight:900;margin-bottom:8px;
  background:linear-gradient(135deg,#40B4FF,#C8A8FF,#FFD166);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.award-sub{font-size:17px;font-weight:700;margin-bottom:14px;color:var(--dark);}
.award-confetti{font-size:22px;margin-bottom:6px;}
.award-info{
  background:rgba(64,140,200,0.08);
  border:1px solid rgba(64,180,255,0.12);
  border-radius:var(--radius-sm);padding:16px;margin:14px 0;
  font-size:14px;line-height:1.8;text-align:left;
}
.award-disclaimer{font-size:12px;color:var(--mid);margin-top:14px;padding:12px;background:rgba(64,140,200,0.06);border-radius:var(--radius-sm);line-height:1.6;}
.screenshot-hint{
  background:rgba(255,209,102,0.1);
  border:1px dashed rgba(255,209,102,0.4);
  border-radius:var(--radius-sm);
  padding:13px 16px;font-size:14px;font-weight:700;
  color:var(--gold);margin:14px 0;text-align:center;
}

/* ── MISC ── */
.type-tag{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:99px;font-size:13px;font-weight:700;}
.type-tag.company{background:rgba(167,139,250,0.15);color:var(--company-color);border:1px solid rgba(167,139,250,0.3);}
.type-tag.hao{background:rgba(52,211,153,0.1);color:var(--hao-color);border:1px solid rgba(52,211,153,0.3);}
.divider{height:1px;background:rgba(64,180,255,0.12);margin:18px 0;}
.tag-row{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0;}
.tag{padding:5px 13px;border-radius:99px;font-size:13px;font-weight:500;background:rgba(64,140,200,0.1);color:var(--mid);border:1px solid rgba(64,180,255,0.12);}
.notice{background:rgba(255,209,102,0.07);border:1px solid rgba(255,209,102,0.2);border-radius:var(--radius-sm);padding:12px 16px;font-size:13px;line-height:1.7;margin:10px 0;color:var(--dark);}
.hidden{display:none!important;}
.fade-in{animation:slideUp 0.4s ease;}
@media(max-width:600px){.card{padding:18px 14px;}.step-dot{font-size:10px;min-width:24px;height:24px;}}
</style>
</head>

const CHARS=[
  {key:'female_headset',  name:'通訊指揮官'},
  {key:'male_captain',    name:'艦隊艦長'},
  {key:'green_alien',     name:'星際商人'},
  {key:'astronaut',       name:'太空探索家'},
];
function charImg(key){
  return '<img src="'+CHAR_IMGS[key]+'" style="width:100%;height:100%;object-fit:contain;display:block;" alt="">';
}
function el(id){return document.getElementById(id);}
function updateProgress(){
  if(state.currentStage===0) return;
  const pct=Math.round((state.currentStage/state.totalStages)*100);
  el('progressBar').style.width=pct+'%';
  el('progressLabel').textContent=`第 ${state.currentStage} 關 / 共 ${state.totalStages} 關`;
  el('progressPct').textContent=pct+'%';
  document.querySelectorAll('.step-dot').forEach(d=>{
    const s=parseInt(d.dataset.step);
    d.classList.remove('active','done');
    if(s<state.currentStage){d.classList.add('done');d.textContent='✓';}
    else if(s===state.currentStage){d.classList.add('active');d.textContent=s;}
    else d.textContent=s;
  });
}
function render(html){el('gameArea').innerHTML=html;updateProgress();}
function goNext(){state.currentStage++;renderStage(state.currentStage);window.scrollTo({top:0,behavior:'smooth'});}
function playerName(){return state.playerName||'指揮官';}
// SKIP LEFT (order:-1), NEXT RIGHT
function btnRow(nextHtml,showSkip=true){
  const skipHtml=showSkip?`<button class="btn btn-skip" onclick="goNext()">← 跳過此關</button>`:'';
  return `<div class="btn-row">${skipHtml}${nextHtml}</div>`;
}

function renderStage(n){
  switch(n){
    case 0:stageIntro();break;
    case 1:stage1();break;case 2:stage2();break;case 3:stage3();break;
    case 4:stage4();break;case 5:stage5();break;case 6:stage6();break;
    case 7:stage7();break;default:renderEnd();
  }
}

// ══════════════════════════════════════════
// INTRO
// ══════════════════════════════════════════
function stageIntro(){
  el('progressWrap').classList.add('hidden');
  render(`
  <div class="card">
    <div class="card-badge">🌌 登入系統</div>
    <h2 class="card-title">選擇你的星際身份</h2>
    <p class="card-desc">歡迎來到創業星系！選擇你的角色，輸入指揮官代號，然後啟航！</p>
    <p style="font-size:13px;color:var(--mid);margin:14px 0 6px;font-weight:700;letter-spacing:0.5px">▸ 選擇角色</p>
    <div class="char-grid" id="charGrid">
      ${CHARS.map((c,i)=>`
      <div class="char-card" id="char${i}" onclick="introPickChar(${i})">
        <div class="char-avatar">${charImg(c.key)}</div>
        <div class="char-name">${c.name}</div>
      </div>`).join('')}
    </div>

function s2Toggle(i){
  const idx=state.selectedItems.indexOf(i);
  if(idx===-1)state.selectedItems.push(i);else state.selectedItems.splice(idx,1);
  el(`cb${i}`).classList.toggle('checked',state.selectedItems.includes(i));
  el(`cbBox${i}`).textContent=state.selectedItems.includes(i)?'✓':'';
  el('s2Btn').disabled=state.selectedItems.length===0&&state.customItems.length===0;
  s2UpdateHint();
}
function s2AddCustom(){
  const val=el('customInput').value.trim();
  if(!val)return;
  if(state.customItems.includes(val)){el('customInput').value='';return;}
  state.customItems.push(val);
  el('customInput').value='';
  const area=el('customTagArea');
  const tag=document.createElement('span');
  tag.className='custom-tag';tag.dataset.val=val;
  tag.innerHTML=`✏️ ${val} <span class="del-btn" onclick="s2RemoveCustom('${val.replace(/'/g,"\\'")}')">×</span>`;
  area.appendChild(tag);
  el('s2Btn').disabled=false;s2UpdateHint();
}
function s2RemoveCustom(val){
  state.customItems=state.customItems.filter(v=>v!==val);
  document.querySelectorAll('.custom-tag').forEach(t=>{if(t.dataset.val===val)t.remove();});
  if(state.selectedItems.length===0&&state.customItems.length===0)el('s2Btn').disabled=true;
  s2UpdateHint();
}
function s2UpdateHint(){
  const sp=[0,1,5,6];
  const hasSpecial=state.selectedItems.some(i=>sp.includes(i));
  const hasCustomSpecial=/醫療|寵物|菸|酒/.test(state.customItems.join(''));

      <strong>寵物業</strong>（動保機關許可）、<strong>菸酒販售</strong>（財政部許可）。<br>
      登記前記得確認是否符合資格！`;
  }else{el('s2Hint').classList.add('hidden');}
}
function s2SelectAll(){
  const all=state.selectedItems.length===items2.length;
  state.selectedItems=all?[]:items2.map((_,i)=>i);
  items2.forEach((_,i)=>{el(`cb${i}`).classList.toggle('checked',!all);el(`cbBox${i}`).textContent=!all?'✓':'';});
  el('s2Btn').disabled=all&&state.customItems.length===0;
  el('s2SelectAll').textContent=all?'全選':'取消全選';
  s2UpdateHint();
}
function s2Next(){
  const selNames=[...state.selectedItems.map(i=>items2[i].name),...state.customItems].join('、');
  const btn=el('s2Btn');
  btn.insertAdjacentHTML('afterend',`<div class="info-box tip fade-in" style="margin-top:10px">✅ 已選擇：<strong>${selNames}</strong><br>太棒了！繼續前進！</div>`);
  btn.disabled=true;setTimeout(goNext,1200);
}

function s4GetCenter(elem){
  const rect=elem.getBoundingClientRect();
  const svgRect=el('s4Svg').getBoundingClientRect();
  return {
    x: rect.left + rect.width/2 - svgRect.left,
    y: rect.top  + rect.height/2 - svgRect.top
  };
}

function s4GetEdge(elem, side){
  const rect=elem.getBoundingClientRect();
  const svgRect=el('s4Svg').getBoundingClientRect();
  if(side==='right') return {
    x: rect.right - svgRect.left,
    y: rect.top + rect.height/2 - svgRect.top
  };
  return {
    x: rect.left - svgRect.left,
    y: rect.top + rect.height/2 - svgRect.top
  };
}

function s4DrawLine(fromEl, toEl, color, id){
  const svg=el('s4Svg');
  const p1=s4GetEdge(fromEl,'right');
  const p2=s4GetEdge(toEl,'left');
  const mx=(p1.x+p2.x)/2;
  const line=document.createElementNS('http://www.w3.org/2000/svg','path');
  line.setAttribute('id','line_'+id);
  line.setAttribute('d',`M${p1.x},${p1.y} C${mx},${p1.y} ${mx},${p2.y} ${p2.x},${p2.y}`);
  line.setAttribute('stroke',color);
  line.setAttribute('stroke-width','3');
  line.setAttribute('fill','none');
  line.setAttribute('opacity','0.95');
  // Animate draw
  try{
    const len=line.getTotalLength();
    line.style.strokeDasharray=len;
    line.style.strokeDashoffset=len;
    line.style.transition='stroke-dashoffset 0.4s ease';
    svg.appendChild(line);
    setTimeout(()=>line.style.strokeDashoffset='0',10);
  } catch(e){
    svg.appendChild(line);
  }
  // Dots at endpoints
  [{p:p1,side:'from'},{p:p2,side:'to'}].forEach(({p,side})=>{
    const dot=document.createElementNS('http://www.w3.org/2000/svg','circle');
    dot.setAttribute('cx',p.x); dot.setAttribute('cy',p.y); dot.setAttribute('r','5');
    dot.setAttribute('fill',color);
    svg.appendChild(dot);
  });
}

function s4PickLeft(id){
  if(s4Matched[id]!==undefined)return;
  s4SelectedLeft=id;
  document.querySelectorAll('[id^="ml"]').forEach(e=>e.classList.remove('selected-left'));
  el('ml'+id).classList.add('selected-left');
}

function s4Drop(e,type){ e.preventDefault(); const id=parseInt(e.dataTransfer?.getData('s4id')||'-1'); if(id<0)return; s4SelectedLeft=id; s4PickRight(type); }

function s4PickRight(type){
  if(s4SelectedLeft===null)return;
  const item=window._s4Items.find(i=>i.id===s4SelectedLeft);
  if(!item)return;
  const correct=item.correct===type;
  const leftEl=el('ml'+s4SelectedLeft);

  if(correct){
    const colors={company:'#A78BFA',hao:'#34D399',both:'#7FFFDF'};
    const color=colors[type]||'#40B4FF';
    const targetEl=el('s4t_'+type);

    // Draw line
    s4DrawLine(leftEl, targetEl, color, s4SelectedLeft);

    s4Matched[s4SelectedLeft]=true;
    leftEl.classList.remove('selected-left');
    leftEl.style.borderColor=color;
    leftEl.style.color=color;
    leftEl.style.background='rgba(64,180,255,0.06)';
    leftEl.onclick=null;

    // Dim matched target if fully used
  } else {
    leftEl.classList.add('wrong-flash');
    setTimeout(()=>leftEl.classList.remove('wrong-flash'),500);
    s4SelectedLeft=null; return;
  }
  s4SelectedLeft=null;
  document.querySelectorAll('[id^="ml"]').forEach(e=>e.classList.remove('selected-left'));
  const count=Object.keys(s4Matched).length;
  el('s4MatchStatus').textContent=`已連線 ${count} / ${window._s4Items.length} 題`;
  if(count===window._s4Items.length){
    setTimeout(()=>{
      el('s4MatchFeedback').innerHTML=`<div class="quiz-feedback correct">🎉 全部連線正確！你已掌握公司與行號的文件差異！</div>`;
      el('s4MatchFeedback').classList.remove('hidden');
      el('s4NextBtn').classList.remove('hidden');
    },300);
  }
}

    <div id="s7SkipRow">${btnRow('',true).replace('btn-row','btn-row" style="justify-content:flex-start')}</div>
    <div id="s7Award" class="hidden"></div>
  </div>`);
  state.checklist={};
}
function s7Toggle(id){
  state.checklist[id]=!state.checklist[id];
  el('cli_'+id).classList.toggle('done',state.checklist[id]);
  el('cc_'+id).textContent=state.checklist[id]?'✓':'';
  const done=Object.values(state.checklist).filter(Boolean).length;
  el('s7Progress').textContent=`已完成 ${done} / ${checklistItems.length} 項`;
  if(done===checklistItems.length)setTimeout(showAward,500);
}

function showAward(){
  el('s7SkipRow').classList.add('hidden');
  const entityLabel=state.entityType==='company'?'有限公司 🏢':state.entityType==='hao'?'行號 🏪':'（未選擇）';
  const selTags=[
    ...state.selectedItems.map(i=>`<span class="tag">${items2[i].icon} ${items2[i].name}</span>`),
    ...state.customItems.map(v=>`<span class="tag">✏️ ${v}</span>`)
  ].join('')||'<span class="tag">尚未選擇</span>';

  el('s7Award').innerHTML=`
  <div class="award-screen" id="awardContent">
    <span class="award-trophy">🏆</span>
    <div class="award-confetti">✨ 🎊 🌟 🎉 ✨</div>
    <div class="award-title">MISSION COMPLETE</div>
    <div class="award-sub">${playerName()}，你完成了台灣公司行號設立全流程！</div>
    <div class="award-info">
      <div style="font-weight:700;margin-bottom:10px;font-family:'Orbitron',monospace;font-size:13px;color:var(--primary);letter-spacing:0.5px">▸ 你的創業摘要</div>
      <div style="margin-bottom:8px">
        <strong>登記類型：</strong>
        <span class="type-tag ${state.entityType==='company'?'company':'hao'}">${entityLabel}</span>
      </div>
      <div>
        <strong>營業項目：</strong><br>
        <div class="tag-row" style="margin-top:6px">${selTags}</div>
      </div>
    </div>
    <div class="screenshot-hint">📸 請截圖保存這張開業獎狀！</div>
    <div style="background:rgba(64,180,255,0.06);border:1px solid rgba(64,180,255,0.12);border-radius:var(--radius-sm);padding:16px;margin-bottom:14px;text-align:left;font-size:14px;line-height:1.8">
      <div style="font-weight:700;margin-bottom:6px;color:var(--primary)">📞 下一步：聯絡專業會計師</div>
      想實際開始辦理？歡迎透過 LINE 聯絡我們，會計師將協助：
      <ul style="margin-left:16px;margin-top:6px;color:var(--mid)">
        <li>確認正確的營業項目代碼</li>
        <li>協助驗資（公司適用）</li>
        <li>代辦登記送件</li>
        <li>後續每月記帳報稅</li>
      </ul>
    </div>
    <div class="btn-row" style="justify-content:center;gap:12px;flex-wrap:wrap">
      <a class="btn btn-line" href="https://lin.ee/QMmohTiz" target="_blank">
        <span style="font-size:18px">💬</span> LINE 聯絡我們
      </a>
      <button class="btn btn-secondary" onclick="restartGame()">🔄 再玩一次</button>
    </div>
    <div class="award-disclaimer">
      ⚠️ 本遊戲為教學用途，內容以教育說明為主。<br>
      實際申請前，請務必諮詢<strong>專業會計師或記帳士</strong>，以確保符合最新法規規定。法規如有更新，以政府公告為準。
    </div>
  </div>`;
  el('s7Award').classList.remove('hidden');
  el('s7Award').scrollIntoView({behavior:'smooth',block:'start'});
  launchConfetti();
}

function launchConfetti(){
  const emojis=['⭐','✨','🌟','💫','🔵','🟣','🔷','💎'];
  for(let i=0;i<30;i++){
    setTimeout(()=>{
      const d=document.createElement('div');
      d.textContent=emojis[Math.floor(Math.random()*emojis.length)];
      d.style.cssText=`position:fixed;font-size:${14+Math.random()*18}px;left:${Math.random()*100}vw;top:-40px;z-index:9999;pointer-events:none;animation:confettiFall ${1.2+Math.random()*0.9}s ease-in forwards;`;
      document.body.appendChild(d);
      setTimeout(()=>d.remove(),2500);
    },i*60);
  }
}
const _s=document.createElement('style');
_s.textContent=`@keyframes confettiFall{to{transform:translateY(110vh) rotate(540deg);opacity:0;}}`;
document.head.appendChild(_s);

function restartGame(){
  Object.assign(state,{currentStage:0,entityType:null,selectedItems:[],customItems:[],sitAnswers:[null,null,null],checklist:{},playerName:'',playerEmoji:'創業者',playerAvatarSvg:''});
  el('headerMascot').innerHTML='🚀';
  el('headerMascot').style.fontSize='60px';
  el('progressWrap').classList.add('hidden');
  renderStage(0);window.scrollTo({top:0,behavior:'smooth'});
}

// ── START ──
renderStage(0);
</script>
</body>
</html>
